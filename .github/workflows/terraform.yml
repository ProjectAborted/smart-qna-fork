name: Terraform Infrastructure

on:
  push:
    branches: [main]
    paths: [terraform/**, .github/workflows/terraform.yml]
  pull_request:
    branches: [main]
    paths: [terraform/**, .github/workflows/terraform.yml]
  workflow_dispatch:

env:
  TF_WORKING_DIR: ./terraform

jobs:
  # ── Validate on every push/PR touching terraform/ ─────────────────────────
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Format check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

  # ── Plan + Apply on push to main or manual trigger ────────────────────────
  apply:
    needs: validate
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Validate required notification vars
        shell: bash
        env:
          NOTIFICATION_DB_HOST: ${{ secrets.NOTIFICATION_DB_HOST }}
          NOTIFICATION_DB_PORT: ${{ secrets.NOTIFICATION_DB_PORT }}
          NOTIFICATION_DB_NAME: ${{ secrets.NOTIFICATION_DB_NAME }}
          NOTIFICATION_DB_USER: ${{ secrets.NOTIFICATION_DB_USER }}
          NOTIFICATION_DB_PASSWORD: ${{ secrets.NOTIFICATION_DB_PASSWORD }}
          NOTIFICATION_WORKER_IMAGE_URI: ${{ secrets.NOTIFICATION_WORKER_IMAGE_URI }}
          NOTIFICATION_API_IMAGE_URI: ${{ secrets.NOTIFICATION_API_IMAGE_URI }}
          NOTIFICATION_ALLOWED_ORIGINS: ${{ secrets.NOTIFICATION_ALLOWED_ORIGINS }}
        run: |
          required_vars=(
            NOTIFICATION_DB_HOST
            NOTIFICATION_DB_PORT
            NOTIFICATION_DB_NAME
            NOTIFICATION_DB_USER
            NOTIFICATION_DB_PASSWORD
            NOTIFICATION_WORKER_IMAGE_URI
            NOTIFICATION_API_IMAGE_URI
            NOTIFICATION_ALLOWED_ORIGINS
          )
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required GitHub Secret: ${var_name}"
              exit 1
            fi
          done

      # Show the plan in the logs before applying
      - name: Terraform Plan
        run: terraform plan -no-color -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
          TF_VAR_db_url: ${{ secrets.DATABASE_URL }}
          TF_VAR_sqs_queue_url: ${{ secrets.SQS_QUEUE_URL }}
          TF_VAR_notification_db_host: ${{ secrets.NOTIFICATION_DB_HOST }}
          TF_VAR_notification_db_port: ${{ secrets.NOTIFICATION_DB_PORT }}
          TF_VAR_notification_db_name: ${{ secrets.NOTIFICATION_DB_NAME }}
          TF_VAR_notification_db_user: ${{ secrets.NOTIFICATION_DB_USER }}
          TF_VAR_notification_db_password: ${{ secrets.NOTIFICATION_DB_PASSWORD }}
          TF_VAR_notification_worker_image_uri: ${{ secrets.NOTIFICATION_WORKER_IMAGE_URI }}
          TF_VAR_notification_api_image_uri: ${{ secrets.NOTIFICATION_API_IMAGE_URI }}
          TF_VAR_notification_allowed_origins: ${{ secrets.NOTIFICATION_ALLOWED_ORIGINS }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
          TF_VAR_db_url: ${{ secrets.DATABASE_URL }}
          TF_VAR_sqs_queue_url: ${{ secrets.SQS_QUEUE_URL }}
          TF_VAR_notification_db_host: ${{ secrets.NOTIFICATION_DB_HOST }}
          TF_VAR_notification_db_port: ${{ secrets.NOTIFICATION_DB_PORT }}
          TF_VAR_notification_db_name: ${{ secrets.NOTIFICATION_DB_NAME }}
          TF_VAR_notification_db_user: ${{ secrets.NOTIFICATION_DB_USER }}
          TF_VAR_notification_db_password: ${{ secrets.NOTIFICATION_DB_PASSWORD }}
          TF_VAR_notification_worker_image_uri: ${{ secrets.NOTIFICATION_WORKER_IMAGE_URI }}
          TF_VAR_notification_api_image_uri: ${{ secrets.NOTIFICATION_API_IMAGE_URI }}
          TF_VAR_notification_allowed_origins: ${{ secrets.NOTIFICATION_ALLOWED_ORIGINS }}
